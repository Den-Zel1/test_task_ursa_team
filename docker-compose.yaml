version: '3.8'

services:
  esports-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: esports_matches_site
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - PANDASCORE_TOKEN=${PANDASCORE_TOKEN}
      - UTC_OFFSET=3
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/today"]
      interval: 30s
      timeout: 10s
      retries: 3

