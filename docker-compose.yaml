version: '3.8'

services:
  esports-app:
    build: .
    container_name: esports_matches_site
    expose:
      - "8000"
    env_file:
      - .env
    environment:
      - PANDASCORE_TOKEN=${PANDASCORE_TOKEN}
      - UTC_OFFSET=3
    restart: unless-stopped

  nginx:
    image: nginx:latest
    container_name: nginx_proxy
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - esports-app

